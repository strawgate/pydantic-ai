# Manually fan out a workflow_dispatch to every scheduled Pydantic AI agent,
# one at a time with a short delay between each, so they don't all hit the
# model endpoint / GitHub API at once. This is a plain deterministic workflow
# (no gh-aw harness): it just calls `gh workflow run` in sequence.
name: Pydantic AI Agents — Orchestrator

on:
  workflow_dispatch:
    inputs:
      delay-seconds:
        description: "Seconds to wait between dispatching each agent (1-120)"
        type: number
        default: 30
      include-bug-hunter-docs-drift:
        description: "Also dispatch bug-hunter and docs-drift (not just the sweeps/detector/explore)"
        type: boolean
        default: true

# Least privilege: creating workflow_dispatch events needs only actions:write.
permissions:
  actions: write

concurrency:
  group: pydantic-ai-agents-orchestrator
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Dispatch agents sequentially
        # Inputs/context are passed via env (never interpolated into the
        # script body) so this step is injection-safe.
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          DELAY: ${{ inputs.delay-seconds }}
          INCLUDE_BH_DD: ${{ inputs.include-bug-hunter-docs-drift }}
        run: |
          set -euo pipefail

          sweeps=(
            pydantic-ai-provider-mapping-sweep.lock.yml
            pydantic-ai-roundtrip-sweep.lock.yml
            pydantic-ai-regression-detector.lock.yml
            pydantic-ai-provider-parity-explore.lock.yml
            pydantic-ai-streaming-resilience-sweep.lock.yml
          )
          extra=(
            pydantic-ai-bug-hunter.lock.yml
            pydantic-ai-docs-drift.lock.yml
          )

          if [ "${INCLUDE_BH_DD}" = "true" ]; then
            list=( "${extra[@]}" "${sweeps[@]}" )
          else
            list=( "${sweeps[@]}" )
          fi

          # Clamp the delay to a sane "short" range; default 30s on bad input.
          delay="${DELAY:-30}"
          case "$delay" in (''|*[!0-9]*) delay=30 ;; esac
          [ "$delay" -lt 1 ] && delay=1
          [ "$delay" -gt 120 ] && delay=120

          n=${#list[@]}
          echo "Dispatching $n agent workflow(s) on ref '$REF' with ${delay}s between each."
          failed=0
          i=0
          for wf in "${list[@]}"; do
            i=$((i + 1))
            echo "::group::[$i/$n] gh workflow run $wf"
            if gh workflow run "$wf" --repo "$REPO" --ref "$REF"; then
              echo "dispatched: $wf"
            else
              echo "::warning::failed to dispatch $wf (continuing with the rest)"
              failed=$((failed + 1))
            fi
            echo "::endgroup::"
            if [ "$i" -lt "$n" ]; then
              echo "waiting ${delay}s before the next dispatch…"
              sleep "$delay"
            fi
          done

          echo "Done: $((n - failed))/$n dispatched."
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed workflow(s) failed to dispatch"
            exit 1
          fi
