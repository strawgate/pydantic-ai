        . The project is structured as a `uv` workspace monorepo, including core framework components, an evaluation system,
        a graph execution engine, examples, and a CLI tool .\\n\\n## Core Purpose and Features\\nThe primary purpose of Pydantic
        AI is to simplify the development of reliable AI applications by offering a robust framework that integrates type-safety
        and an intuitive developer experience . It aims to provide a unified approach to interacting with various LLM providers
        and managing complex agent workflows .\\n\\nKey features include:\\n*   **Type-Safe Agents**: Agents are generic `Agent[Deps,
        Output]` for compile-time validation, utilizing `RunContext[Deps]` for dependency injection and Pydantic `output_type`
        for output validation .\\n*   **Model-Agnostic Design**: It supports over 15 LLM providers through a unified `Model`
        interface, allowing developers to switch between different models without significant code changes .\\n*   **Structured
        Outputs**: Pydantic AI leverages Pydantic for automatic validation and self-correction of structured outputs from
        LLMs .\\n*   **Comprehensive Observability**: The framework includes comprehensive observability features via OpenTelemetry
        and native Logfire integration .\\n*   **Production-Ready Tooling**: This includes an evaluation framework (`pydantic-evals`),
        durable execution capabilities, and protocol integrations .\\n\\n## Monorepo Package Structure\\nPydantic AI is organized
        as a `uv` workspace monorepo containing several distinct Python packages :\\n\\n```mermaid\\ngraph TB\\n    subgraph
        \\\"Main Packages\\\"\\n        PYDANTIC_AI[\\\"pydantic-ai<br/>(Metapackage)\\\"]\\n        SLIM[\\\"pydantic-ai-slim<br/>Core
